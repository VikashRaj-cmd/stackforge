<!--
  main-layout.component.html

  WHY:
  Creates responsive dashboard layout with sliding sidebar drawer (Material Sidenav)
  for smaller screens and fixed sidebar for desktop screens.
-->

<mat-sidenav-container class="app-shell-container">
  <mat-sidenav
    #sidenav
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="!isMobile"
    class="app-sidebar-drawer"
  >
    <app-sidebar (linkClicked)="isMobile ? sidenav.close() : null"></app-sidebar>
  </mat-sidenav>

  <mat-sidenav-content class="main-area">
    <app-navbar (toggleSidebar)="sidenav.toggle()"></app-navbar>

    <section class="page-content">
      <router-outlet></router-outlet>
    </section>
  </mat-sidenav-content>
</mat-sidenav-container>
