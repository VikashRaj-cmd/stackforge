<!--
  navbar.html

  WHY:
  Top navbar with search, profile dropdown (profile, settings, logout).
-->

<header class="navbar">
  <div>
    <p class="welcome">Welcome back</p>
    <h1>Issue Tracking Dashboard</h1>
  </div>

  <div class="right-section">
    <div class="search-box">
      <mat-icon>search</mat-icon>
      <input type="text" placeholder="Search issues, projects..." />
    </div>

    <button class="nav-notification-btn" routerLink="/notifications" aria-label="Notifications" type="button">
      <mat-icon>notifications</mat-icon>
      @if (notificationService.unreadCount() > 0) {
        <span class="badge">
          {{ notificationService.unreadCount() }}
        </span>
      }
    </button>

    <button class="nav-theme-btn" (click)="toggleTheme()" aria-label="Toggle Theme" type="button">
      <mat-icon>
        {{ currentTheme === 'light' ? 'dark_mode' : 'light_mode' }}
      </mat-icon>
    </button>

    <div class="profile-menu">
      <div class="profile-trigger" (click)="toggleDropdown()">
        <div class="avatar">{{ initials }}</div>
        <div class="profile-info">
          <span class="profile-name">{{ user?.name || 'User' }}</span>
          <span class="profile-role">{{ user?.role || 'member' }}</span>
        </div>
      </div>

      @if (dropdownOpen) {
        <div class="dropdown">
          <div class="dropdown-header">
            <div class="avatar avatar-lg">{{ initials }}</div>
            <div>
              <p class="dh-name">{{ user?.name || 'User' }}</p>
              <p class="dh-email">{{ user?.email }}</p>
            </div>
          </div>

          <div class="dropdown-divider"></div>

          <button class="dropdown-item" type="button" (click)="goToProfile()">
            <mat-icon>account_circle</mat-icon>
            Profile
          </button>

          <button class="dropdown-item" type="button" (click)="goToSettings()">
            <mat-icon>settings</mat-icon>
            Settings
          </button>

          <div class="dropdown-divider"></div>

          <button class="dropdown-item logout-item" type="button" (click)="logout()">
            <mat-icon>logout</mat-icon>
            Logout
          </button>
        </div>
      }
    </div>
  </div>
</header>
