<div class="empty-state-card">
  <div class="empty-icon-wrapper">
    <mat-icon>{{ icon }}</mat-icon>
  </div>
  <h3>{{ title }}</h3>
  @if (message) {
    <p>{{ message }}</p>
  }
  
  @if (actionText) {
    @if (actionRoute) {
      <a [routerLink]="actionRoute" class="empty-action-btn">
        {{ actionText }}
      </a>
    } @else {
      <button (click)="onAction()" class="empty-action-btn" type="button">
        {{ actionText }}
      </button>
    }
  }
</div>
