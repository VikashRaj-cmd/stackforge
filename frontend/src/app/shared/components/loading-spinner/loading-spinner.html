<div [class.spinner-overlay]="overlay" [class.spinner-inline]="!overlay">
  <div class="spinner-content">
    <mat-progress-spinner
      mode="indeterminate"
      [diameter]="diameter"
      color="primary"
    ></mat-progress-spinner>
    @if (message) {
      <p class="spinner-message">{{ message }}</p>
    }
  </div>
</div>
