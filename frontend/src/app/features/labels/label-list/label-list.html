<!--
  label-list.html

  WHY:
  User interface to view all project-scoped labels and perform quick CRUD actions.
  Utilises shared components for uniform layouts.
-->

<section class="label-page">
  <!-- Reusable Page Header -->
  <app-page-header
    title="Labels"
    subtitle="Manage categories and tags for issue organisation."
    eyebrow="Workspace Management"
    actionText="Create Label"
    [actionRoute]="'/labels/create'"
  ></app-page-header>

  <!-- Project Selector -->
  <div class="project-selector-card">
    <div class="selector-group">
      <label for="projectSelect">Select Project Workspace</label>
      <select 
        id="projectSelect" 
        [(ngModel)]="selectedProjectId" 
        (change)="loadLabels()"
      >
        <option value="" disabled>Choose a project</option>
        @for (proj of projects; track proj._id) {
          <option [value]="proj._id">{{ proj.title }}</option>
        }
      </select>
    </div>
  </div>

  <!-- Loading State -->
  @if (loading) {
    <app-loading-spinner message="Loading labels..."></app-loading-spinner>
  }

  <!-- Empty State -->
  @if (!loading && (!selectedProjectId || labels.length === 0)) {
    <app-empty-state
      icon="label_off"
      title="No Labels Found"
      [message]="selectedProjectId ? 'Create a new label to organize your issues.' : 'Select a project to view its labels.'"
      [actionText]="selectedProjectId ? 'Create Label' : ''"
      [actionRoute]="selectedProjectId ? '/labels/create' : ''"
    ></app-empty-state>
  }

  <!-- Labels Grid -->
  @if (!loading && labels.length > 0) {
    <div class="labels-grid">
      @for (label of labels; track label._id) {
        <article class="label-card">
          <div class="label-preview-wrapper">
            <span 
              class="label-badge-preview" 
              [style.background-color]="label.color"
              [style.color]="getContrastColor(label.color)"
            >
              {{ label.name }}
            </span>
          </div>

          <div class="label-details">
            <span class="label-color-code">{{ label.color }}</span>
            <p class="description">
              {{ label.description || 'No description provided.' }}
            </p>
          </div>

          <div class="label-actions">
            <button (click)="editLabel(label._id)" class="action-btn edit-btn" type="button" title="Edit label">
              <mat-icon>edit</mat-icon>
            </button>
            <button (click)="deleteLabel(label._id)" class="action-btn delete-btn" type="button" title="Delete label">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </article>
      }
    </div>
  }
</section>
